<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>プリーツ加工 お問い合わせ｜生田プリーツ</title>
<meta name="apple-mobile-web-app-title" content="プリーツ加工 お問い合わせ｜生田プリーツ" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
<style>
  /* overflow-x:hidden は overflow-y:auto を誘発して position:sticky を殺すため clip を使う */
  html, body { margin: 0; padding: 0; background: #ffffff; -webkit-text-size-adjust: 100%; overflow-x: clip; }
  #root { min-height: 100vh; }
  #boot { font-family: 'Hiragino Sans','Noto Sans JP',sans-serif; color: #aaa; text-align: center; padding-top: 42vh; font-size: 14px; }
</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
</head>
<body>
<div id="root"><div id="boot">読み込み中...</div></div>
<script>
(function () {
  // ▼ JSXのファイル名。ファイル名を変えた場合はここだけ直してください。
  var JSX_FILE = "pleats-form-app.jsx";

  function showError(msg) {
    var r = document.getElementById("root");
    if (r) {
      r.innerHTML =
        '<div style="font-family:sans-serif;color:#c00;padding:24px;font-size:14px;line-height:1.7;text-align:center">' +
        'アプリの読み込みに失敗しました。<br>通信状況を確認して、ページを開き直してください。' +
        '<br><br><span style="color:#999;font-size:12px">' + (msg || "") + '</span></div>';
    }
  }

  // 毎回ユニークなURLにして、ブラウザのキャッシュを必ず回避する
  var url = JSX_FILE + "?t=" + Date.now();

  fetch(url, { cache: "no-store" })
    .then(function (res) {
      if (!res.ok) throw new Error("読み込みエラー HTTP " + res.status);
      return res.text();
    })
    .then(function (code) {
      var out;
      try {
        out = Babel.transform(code, { presets: ["react"] }).code;
      } catch (e) {
        throw new Error("変換エラー: " + (e && e.message ? e.message : e));
      }
      // JSXは末尾まで読み込んだあと App を返してもらう
      var factory = new Function("React", "ReactDOM", out + "\n;return App;");
      var App = factory(React, ReactDOM);
      if (typeof App !== "function") throw new Error("App が見つかりません");
      var root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(React.createElement(App));
    })
    .catch(function (e) {
      showError(e && e.message ? e.message : String(e));
    });
})();
</script>
</body>
</html>
